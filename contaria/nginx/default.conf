server {
    listen 80;
    
    # Keep this off to prevent Nginx from trying to "fix" ports it doesn't know about
    port_in_redirect off;
    
    set $cors_origin "*";
    set $cors_methods "GET, POST, PUT, DELETE, OPTIONS";
    set $cors_headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";

    # --- ADD THIS NEW BLOCK ---
    # This catches "localhost:3000/api" exactly and sends it to the backend
    location = /api {
        return 301 /api/;
    }

    # 1. Route API requests to FastAPI
    location /api/ {
        # Preflight check
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_methods always;
        add_header 'Access-Control-Allow-Headers' $cors_headers always;

        proxy_pass http://fastapi-app:8000/;
        
        # Change this to $http_host to ensure port 3000 is passed through
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Route everything else to the Next.js Frontend
    location / {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_methods always;
        add_header 'Access-Control-Allow-Headers' $cors_headers always;

        proxy_pass http://front-end:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host; # Use $http_host here too
        proxy_cache_bypass $http_upgrade;
    }
}
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11435
    ports:
      - "11435:11435"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
 
    entrypoint: /bin/sh
    command:
      - "-c"
      - "ollama serve & sleep 5 && ollama pull llama3.2:latest && wait"
 
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: nextjs-frontend
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3000"

  fastapi-app:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      # Updated to 11435 to match your Ollama service config
      OLLAMA_API_URL: "http://ollama:11435/api/generate"
      OLLAMA_MODEL: "llama3.2:latest"
      # Internal Docker DNS uses the service name 'contaria_db'
      DATABASE_URL: "postgresql://contaria:contaria@contaria_db:5432/contaria"
    depends_on:
      ollama:
        condition: service_healthy
      contaria_db:
        condition: service_healthy
    volumes:
      - ./back-end:/app

  contaria_db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: contaria_db
    volumes:
      - contaria_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # Added healthcheck so FastAPI knows when the DB is actually ready for queries
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contaria -d contaria"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "3000:80"
    depends_on:
      - fastapi-app
      - front-end
    restart: always

volumes:
  ollama_data:
    driver: local
  contaria_db_data: